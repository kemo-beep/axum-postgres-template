<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <p>Your subscription payment is past due.</p>
  <p>Please update your payment method to avoid service interruption.</p>
  {% if let Some(url) = hosted_invoice_url %}<p><a href="{{ url }}" style="color: #0066cc; word-break: break-all;">View your invoice</a></p>{% endif %}
  {% if let Some(url) = billing_url %}<p><a href="{{ url }}" style="color: #0066cc; word-break: break-all;">Update payment method</a></p>{% endif %}
</body>
</html>
