<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <p>Your {{ plan_name }} trial ends soon.</p>
  <p>Your trial will end on {{ trial_end }}. To continue using {{ plan_name }}, please add a payment method before then.</p>
  {% if let Some(url) = billing_url %}<p><a href="{{ url }}" style="color: #0066cc; word-break: break-all;">Manage your subscription</a></p>{% endif %}
</body>
</html>
